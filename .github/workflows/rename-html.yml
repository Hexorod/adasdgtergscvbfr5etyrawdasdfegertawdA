name: Rename HTML Files Sequentially

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  rename-html:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rename HTML files and generate JSON
        shell: bash
        run: |
          shopt -s nullglob

          # Find highest existing numbered HTML file
          max=0
          for f in *.html; do
            if [[ "$f" =~ ^([0-9]+)\.html$ ]]; then
              num="${BASH_REMATCH[1]}"
              (( num > max )) && max=$num
            fi
          done

          count=$((max + 1))

          json_output="["

          for file in *.html; do
            # Skip already numbered files
            if [[ "$file" =~ ^[0-9]+\.html$ ]]; then
              continue
            fi

            original_name=$(basename "$file" .html)

            cleaned_name=$(echo "$original_name" | sed -E 's/^[Cc][Ll]//')
            cleaned_name=$(echo "$cleaned_name" | sed -E 's/[-_]+/ /g')

            formatted_name=$(echo "$cleaned_name" | awk '{for(i=1;i<=NF;i++){$i=toupper(substr($i,1,1)) tolower(substr($i,2))}}1')

            new_name="$count.html"
            git mv "$file" "$new_name"

            json_output="$json_output
              {\"id\": $count, \"name\": \"$formatted_name\"},"

            count=$((count + 1))
          done

          json_output=$(echo "$json_output" | sed '$ s/,$//')
          json_output="$json_output
          ]"

          echo "$json_output" > files.json

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add .
            git commit -m "Renamed HTML files and generated files.json"
            git push
          fi
